global:
  scrape_interval: 30s
  evaluation_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: regiobuild-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:3000"]
        labels:
          service: api
