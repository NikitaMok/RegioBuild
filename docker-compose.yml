# Локально: api + bot на SQLite. Прод — корневой Dockerfile + SERVICE_ROLE.
# Postgres: docker-compose.postgres.yml
# Qdrant: docker compose --profile enterprise up -d qdrant
services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    profiles: ["enterprise"]
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////srv/app/state/regiobuild.db
      LLM_PROVIDER: ${LLM_PROVIDER:-gigachat}
      GIGACHAT_CREDENTIALS: ${GIGACHAT_CREDENTIALS:-}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-2-Pro}
      GIGACHAT_VERIFY_SSL_CERTS: ${GIGACHAT_VERIFY_SSL_CERTS:-false}
      YANDEX_API_KEY: ${YANDEX_API_KEY:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      YANDEX_MODEL: ${YANDEX_MODEL:-yandexgpt/latest}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VECTOR_BACKEND: ${VECTOR_BACKEND:-chroma}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      DEPLOY_PROFILE: ${DEPLOY_PROFILE:-bothost-demo}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      WARMUP_ON_START: ${WARMUP_ON_START:-delayed}
    volumes:
      - app_state:/srv/app/state
    ports:
      - "8000:8000"

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?нужно задать переменную TELEGRAM_BOT_TOKEN}
      API_BASE_URL: http://api:8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - api

volumes:
  app_state:
  qdrant_data:
