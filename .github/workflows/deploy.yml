name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check deploy secrets
        id: gate
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "DEPLOY_HOST / DEPLOY_SSH_KEY не заданы — деплой пропущен"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if deploy secrets missing
        if: steps.gate.outputs.skip == 'true'
        run: |
          echo "Deploy secrets отсутствуют — выкладка невозможна. Задайте DEPLOY_HOST и DEPLOY_SSH_KEY."
          exit 1

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -euo pipefail
            ROOT=/opt/regiobuild
            EXPECTED="${{ github.sha }}"
            if [ ! -d "$ROOT/.git" ]; then
              git clone https://github.com/NikitaMok/RegioBuild.git "$ROOT"
            fi
            cd "$ROOT"
            # Сначала подтягиваем КОД (иначе на сервере старый deploy_remote.sh без verify)
            git fetch origin
            git reset --hard "$EXPECTED"
            test "$(git rev-parse HEAD)" = "$EXPECTED"
            echo "server HEAD=$(git rev-parse --short HEAD) matches github.sha"
            export DEPLOY_PATH="$ROOT"
            export DEPLOY_BRANCH=main
            export EXPECTED_SHA="$EXPECTED"
            chmod +x scripts/deploy_remote.sh scripts/verify_deploy.sh
            # deploy_remote снова сделает fetch/reset + build + verify
            bash scripts/deploy_remote.sh
            # финальный контроль: тот же SHA + UX-маркеры в running API
            export EXPECTED_SHA="$EXPECTED"
            bash scripts/verify_deploy.sh
            test "$(git rev-parse HEAD)" = "$EXPECTED"
            echo "CI deploy gate passed for $EXPECTED"
